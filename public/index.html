<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar Cita</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <span class="badge">Agenda de citas</span>
        <h1>Reserva tu cita en línea</h1>
        <p>Selecciona fecha, horario y completa tus datos. Nosotros te enviamos la confirmación al correo.</p>
      </div>
      <div class="hero-card">
        <p><strong>Horarios disponibles</strong></p>
        <ul>
          <li>09:00 - 10:00</li>
          <li>10:30 - 11:30</li>
          <li>12:00 - 13:00</li>
          <li>14:00 - 15:00</li>
          <li>15:30 - 16:30</li>
        </ul>
      </div>
    </header>

    <main class="container">
      <section class="card form-card">
        <h2>Agendar cita</h2>
        <form id="appointmentForm">
          <div class="field-group">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" name="fecha" required />
          </div>

          <div class="field-group">
            <label for="horario">Horario</label>
            <select id="horario" name="horario" required>
              <option value="">Seleccione un horario</option>
            </select>
          </div>

          <div class="field-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required />
          </div>

          <div class="field-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required />
          </div>

          <div class="field-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+57 300 123 4567" required />
          </div>

          <button type="submit" id="submitButton">Reservar cita</button>
          <div id="message" class="message"></div>
        </form>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
